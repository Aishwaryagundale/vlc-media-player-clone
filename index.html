<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLC Media Player</title>
    <!--for browser reset-->
    <link rel="stylesheet" href="reset.css">
    <!---- for our application-->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="titlebar">
            <img src="./VLC.png" alt="" class="title-img">
            <h1 class="title">VLC media player</h1>
        </div>
        <div class="menubar">
            <div class="menu">
                <div class="menu-btn" id="video-Btn">Open</div>
                <input type="file" id="videoInput">
            </div>
            <div class="menu">
                <div class="menu-btn">Playback</div>
                <ul class="menu-items">
                    <li id="speedUp">SpeedUP</li>
                    <li id="speedDown">SpeedDown</li>
                </ul>
            </div>
            <div class="menu">
                <div class="menu-btn">Audio</div>
                <ul class="menu-items">
                    <li id="volumeUp">Volume Up</li>
                    <li id="volumeDown">Volume Down</li>
                </ul>
            </div>
        </div>
    </header>
    <main id="main">
        
    </main>
    <footer></footer>

    <script src="script.js"></script>
</body>
</html>
